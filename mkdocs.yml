site_name: OmniImage
site_description: Unified Go library for image generation across multiple providers
site_url: https://plexusone.github.io/omniimage
repo_url: https://github.com/plexusone/omniimage
repo_name: plexusone/omniimage

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Providers:
    - Overview: providers/index.md
    - OpenAI: providers/openai.md
    - Fal AI: providers/fal.md
  - Guides:
    - Image Sizes: guides/sizes.md
    - Error Handling: guides/errors.md
    - Best Practices: guides/best-practices.md
  - API Reference:
    - Client: api/client.md
    - Types: api/types.md
    - Providers: api/providers.md
  - Releases:
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/omniimage
